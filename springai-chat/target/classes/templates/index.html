<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KK 聊天助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9; height: 100vh; display: flex;
            justify-content: center; align-items: center;
        }
        .chat-container {
            width: 100%; max-width: 800px; height: 100vh;
            background: #fff; display: flex; flex-direction: column;
            box-shadow: 0 0 20px rgba(0,0,0,.08);
        }
        .chat-header {
            padding: 16px 24px; background: #fff; border-bottom: 1px solid #e2e8f0;
            display: flex; align-items: center; gap: 12px;
        }
        .chat-header .avatar {
            width: 40px; height: 40px; border-radius: 10px;
            background: linear-gradient(135deg, #4f49e6, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 18px;
        }
        .chat-header h1 { font-size: 18px; font-weight: 600; color: #1e293b; }
        .chat-header .subtitle { font-size: 13px; color: #94a3b8; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 20px;
            scroll-behavior: smooth;
        }
        .message { display: flex; gap: 12px; max-width: 85%; }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.assistant { align-self: flex-start; }
        .message .avatar {
            width: 34px; height: 34px; border-radius: 8px; flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 600;
        }
        .message.user .avatar { background: #4f49e6; color: #fff; }
        .message.assistant .avatar { background: #f1f5f9; color: #475569; }
        .message .bubble {
            padding: 10px 16px; border-radius: 12px;
            line-height: 1.6; font-size: 14px; white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user .bubble {
            background: #4f49e6; color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant .bubble {
            background: #f1f5f9; color: #1e293b;
            border-bottom-left-radius: 4px;
        }
        .message .bubble.loading::after {
            content: "..."; animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots { 0% { content: "."; } 33% { content: ".."; } 66% { content: "..."; } }
        .chat-input-area {
            padding: 16px 24px 24px; border-top: 1px solid #e2e8f0;
            background: #fff;
        }
        .chat-input-wrapper {
            display: flex; gap: 8px; align-items: flex-end;
            background: #f1f5f9; border: 1px solid #e2e8f0;
            border-radius: 12px; padding: 8px 12px;
            transition: border-color .2s;
        }
        .chat-input-wrapper:focus-within { border-color: #4f49e6; }
        .chat-input-wrapper textarea {
            flex: 1; border: none; background: transparent;
            font-size: 14px; line-height: 1.5; resize: none;
            outline: none; font-family: inherit;
            max-height: 120px; min-height: 24px;
        }
        .chat-input-wrapper button {
            background: #4f49e6; color: #fff; border: none;
            border-radius: 8px; width: 36px; height: 36px;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; transition: background .2s;
            flex-shrink: 0;
        }
        .chat-input-wrapper button:hover { background: #4338ca; }
        .chat-input-wrapper button:disabled { opacity: .5; cursor: not-allowed; }
        .chat-input-wrapper button svg { width: 18px; height: 18px; }
        .footer-text {
            text-align: center; font-size: 11px; color: #94a3b8;
            margin-top: 8px;
        }
        .welcome {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; flex: 1; gap: 12px;
            color: #94a3b8; text-align: center; padding: 40px;
        }
        .welcome .icon {
            width: 64px; height: 64px; border-radius: 16px;
            background: linear-gradient(135deg, #4f49e6, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin-bottom: 4px;
        }
        .welcome h2 { font-size: 20px; color: #334155; font-weight: 600; }
        .welcome p { font-size: 14px; max-width: 360px; }
        .error-toast {
            display: none; position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%); background: #ef4444; color: #fff;
            padding: 10px 20px; border-radius: 8px; font-size: 13px;
            z-index: 1000; animation: fadeIn .3s;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(-50%) translateY(-10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @media (max-width: 600px) {
            .chat-container { max-width: 100%; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <div id="errorToast" class="error-toast"></div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">K</div>
            <div>
                <h1>KK</h1>
                <div class="subtitle">在线 · AI 智能助手</div>
            </div>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="welcome" id="welcome">
                <div class="icon">K</div>
                <h2>你好！我是 KK</h2>
                <p>我是你的 AI 助手，有什么可以帮你的吗？</p>
            </div>
        </div>

        <div class="chat-input-area">
            <div class="chat-input-wrapper">
                <textarea id="inputField" rows="1" placeholder="给 KK 发送消息..."
                          oninput="autoResize(this)" onkeydown="handleKeyDown(event)"></textarea>
                <button id="sendBtn" onclick="sendMessage()" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
                    </svg>
                </button>
            </div>
            <div class="footer-text">KK · 内容由 AI 生成，仅供参考</div>
        </div>
    </div>

    <script>
        let isLoading = false;
        const messagesEl = document.getElementById('chatMessages');
        const inputField = document.getElementById('inputField');
        const sendBtn = document.getElementById('sendBtn');

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, 120) + 'px';
            sendBtn.disabled = !el.value.trim() || isLoading;
        }

        function handleKeyDown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function showError(msg) {
            const toast = document.getElementById('errorToast');
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 4000);
        }

        function addMessage(role, content) {
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = 'message ' + role;
            div.innerHTML = '<div class="avatar">' + (role === 'user' ? 'U' : 'K') + '</div>' +
                            '<div class="bubble">' + escapeHtml(content) + '</div>';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function addLoadingMessage() {
            const welcome = document.getElementById('welcome');
            if (welcome) welcome.remove();

            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = '<div class="avatar">K</div><div class="bubble loading"></div>';
            messagesEl.appendChild(div);
            messagesEl.scrollTop = messagesEl.scrollHeight;
            return div;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function sendMessage() {
            const msg = inputField.value.trim();
            if (!msg || isLoading) return;

            inputField.value = '';
            autoResize(inputField);

            addMessage('user', msg);
            const loadingMsg = addLoadingMessage();
            isLoading = true;
            sendBtn.disabled = true;

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: msg })
                });
                if (!res.ok) throw new Error((await res.text()) || '请求失败');
                const text = await res.text();
                loadingMsg.querySelector('.bubble').textContent = text;
                loadingMsg.querySelector('.bubble').classList.remove('loading');
            } catch (err) {
                loadingMsg.querySelector('.bubble').textContent = '出错了: ' + err.message;
                loadingMsg.querySelector('.bubble').classList.remove('loading');
                showError(err.message);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                messagesEl.scrollTop = messagesEl.scrollHeight;
            }
        }
    </script>
</body>
</html>
